name: MFESE Engine

on:
  pull_request:
    paths:
      - "mfese-engine/**"
      - ".github/workflows/mfese-engine.yml"
  push:
    paths:
      - "mfese-engine/**"
      - ".github/workflows/mfese-engine.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "./mfese-engine[dev]"
      - name: Test
        run: pytest mfese-engine/tests -q
      - name: Export schemas
        working-directory: mfese-engine
        run: python tools/export_schemas.py
