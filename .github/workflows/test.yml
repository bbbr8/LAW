name: test

on:
  pull_request:
  push:
    branches:
      - main
      - feature/living-proof-debt-resolver

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  case-vision-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install pillow
      - run: python -m unittest discover -s tests -v
      - run: python -m research.case_vision_lab.synthetic_benchmark --count 1
