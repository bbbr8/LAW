name: test

on:
  pull_request:
  push:
    branches:
      - main
      - feature/living-proof-debt-resolver

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
